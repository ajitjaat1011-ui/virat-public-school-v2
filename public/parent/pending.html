<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Pending Review · Virat Public School</title>
  <link rel="icon" type="image/svg+xml" href="../images/favicon.svg" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Fraunces:wght@500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../css/style.css?v=12" />
  <style>
    .auth-wrap {
      min-height: calc(100vh - 64px);
      display: flex; align-items: center; justify-content: center;
      padding: 40px 24px;
      background: var(--tint);
    }
    .auth-card {
      width: 100%; max-width: 460px;
      background: var(--paper);
      border: 1px solid var(--line);
      border-radius: var(--r-lg);
      padding: 32px;
      text-align: center;
    }
    .auth-card h1 { font-size: 1.4rem; margin: 16px 0 8px; }
    .auth-card p { color: var(--ink-3); font-size: 14px; }
  </style>
</head>
<body>
  <a href="#main" class="skip-link">Skip to main content</a>
  <div id="vps-topbar"></div>
  <div id="vps-header"></div>
  <main id="main">
    <div class="auth-wrap">
      <div class="auth-card">
        <div style="font-size: 32px;">⏳</div>
        <h1>Your account is pending review</h1>
        <p>The school office has received your request and will review it shortly. You will be able to sign in once your account is approved.</p>
        <p style="margin-top: 24px;"><a href="../index.html" class="btn btn-secondary">Back to site</a> · <a href="login.html" class="btn btn-ghost">Try again</a></p>
      </div>
    </div>
  </main>
  <div id="vps-footer"></div>
  <script src="../js/partials.js?v=10"></script>
</body>
</html>
