<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Parent dashboard · VPS</title>
  <meta name="description" content="View your child's upcoming exams and published results." />
  <meta name="theme-color" content="#ff3d80" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <link rel="manifest" href="/manifest.json" />
  <link rel="icon" type="image/svg+xml" href="/images/favicon.svg" />
  <link rel="apple-touch-icon" href="/images/icon-192.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="preload" as="style" onload="this.onload=null;this.rel='stylesheet'" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" />
  <link rel="stylesheet" href="/css/style.css?v=14" />
  <style>
    .stat-app-grid { padding-top: 8px; }
    .exam-card {
      display: flex; gap: 14px; align-items: flex-start;
      padding: 16px;
      background: var(--glass-bg-strong);
      backdrop-filter: blur(20px) saturate(180%);
      -webkit-backdrop-filter: blur(20px) saturate(180%);
      border: 1px solid var(--glass-border);
      border-radius: var(--r-md);
      margin-bottom: 8px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.04);
    }
    .exam-card .date {
      flex-shrink: 0;
      width: 52px;
      text-align: center;
      background: linear-gradient(135deg, var(--pink-100), var(--sky-100));
      border-radius: var(--r-sm);
      padding: 8px 4px;
    }
    .exam-card .date .day { font-size: 1.4rem; font-weight: 800; line-height: 1; color: var(--pink-600); }
    .exam-card .date .mon { font-size: 10px; text-transform: uppercase; letter-spacing: 0.05em; color: var(--ink-500); margin-top: 2px; display: block; }
    .exam-card .body { flex: 1; min-width: 0; }
    .exam-card .body .row1 { display: flex; align-items: baseline; gap: 8px; flex-wrap: wrap; margin-bottom: 4px; }
    .exam-card .body h3 { font-size: 0.95rem; font-weight: 700; }
    .exam-card .body .meta { font-size: 12px; color: var(--ink-500); }
    .exam-card .body .syllabus { font-size: 13px; color: var(--ink-700); margin-top: 6px; line-height: 1.5; }

    .result-card {
      padding: 16px;
      background: var(--glass-bg-strong);
      backdrop-filter: blur(20px) saturate(180%);
      border: 1px solid var(--glass-border);
      border-radius: var(--r-md);
      margin-bottom: 8px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.04);
    }
    .result-card .row1 { display: flex; justify-content: space-between; align-items: baseline; flex-wrap: wrap; gap: 8px; margin-bottom: 4px; }
    .result-card h3 { font-size: 0.95rem; font-weight: 700; }
    .result-card .meta { font-size: 12px; color: var(--ink-500); margin-bottom: 8px; }
    .result-card .marks { display: flex; align-items: baseline; gap: 6px; }
    .result-card .marks .val { font-size: 1.5rem; font-weight: 800; color: var(--ink-900); }
    .result-card .marks .max { color: var(--ink-500); font-size: 13px; }
    .result-card .marks .grade { margin-left: auto; }
    .result-card .remarks { font-size: 13px; color: var(--ink-700); margin-top: 6px; line-height: 1.5; }

    .signout-link {
      font-size: 13px;
      color: var(--ink-500);
      cursor: pointer;
      padding: 6px 12px;
      border-radius: var(--r-pill);
      text-decoration: none;
    }
    .signout-link:hover { background: var(--pink-50); color: var(--pink-700); }

    .empty-state {
      padding: 40px 20px;
      text-align: center;
      color: var(--ink-500);
      font-size: 14px;
      background: var(--glass-bg-soft);
      border: 1px dashed var(--line);
      border-radius: var(--r-md);
    }
  </style>
</head>
<body>
  <a href="#main" class="skip-link">Skip to main content</a>
  <div id="vps-topbar"></div>
  <div id="vps-header"></div>

  <main id="main">
    <!-- Welcome card -->
    <section class="hero-stat">
      <div class="eyebrow"><span class="pulse"></span> Parent portal</div>
      <h1 id="hello">Welcome</h1>
      <p id="helloSub">Loading…</p>
      <div class="meta">
        <a href="#" id="signoutLink" class="signout-link">Sign out →</a>
      </div>
    </section>

    <!-- Children -->
    <div class="section-head"><h2>Your child(ren)</h2></div>
    <div id="children" class="app-list"></div>

    <!-- Stats summary -->
    <div class="stat-app-grid">
      <div class="stat-app">
        <div class="label">Upcoming exams</div>
        <div class="value" id="stat-upcoming">0</div>
        <div class="sub">Next 90 days</div>
      </div>
      <div class="stat-app">
        <div class="label">Results published</div>
        <div class="value" id="stat-results">0</div>
        <div class="sub">For your child</div>
      </div>
    </div>

    <!-- Upcoming exams -->
    <div class="section-head"><h2>Upcoming & recent exams</h2></div>
    <div id="exams" class="app-list"></div>

    <!-- Results -->
    <div class="section-head"><h2>Published results</h2></div>
    <div id="results" class="app-list"></div>
  </main>

  <footer class="site-footer">
    <div class="footer-bottom">
      <span>© 2026 Virat Public School</span>
      <span><a href="../index.html">School site</a></span>
    </div>
  </footer>

  <script src="/js/partials.js?v=10"></script>
  <script>
    function esc(s) { return String(s == null ? '' : s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;'); }

    const elHello = document.getElementById('hello');
    const elHelloSub = document.getElementById('helloSub');
    const elChildren = document.getElementById('children');
    const elExams = document.getElementById('exams');
    const elResults = document.getElementById('results');

    function renderEmpty(el, msg) {
      el.innerHTML = `<div class="empty-state">${esc(msg)}</div>`;
    }

    async function load() {
      let res, data;
      try {
        res = await fetch('/api/parent/dashboard', { credentials: 'include' });
        data = await res.json();
      } catch (e) {
        window.location.href = 'login.html';
        return;
      }
      if (!res.ok) { window.location.href = 'login.html'; return; }

      const { parent, children, exams, results } = data;
      elHello.textContent = `Hello, ${parent.full_name.split(' ')[0]}.`;
      elHelloSub.textContent = `Signed in as ${parent.phone}.`;

      if (!children.length) {
        elChildren.innerHTML = '<div class="empty-state">No child linked yet. The school office will add this when they approve your request.</div>';
      } else {
        elChildren.innerHTML = children.map(c => `
          <a href="#" class="app-card" onclick="return false;">
            <div class="head">
              <div class="icon">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
              </div>
              <div>
                <h3>${esc(c.student_name)}</h3>
                <p>${esc(c.class_name || '')}${c.section ? ' · ' + esc(c.section) : ''}${c.roll_number ? ' · Roll ' + esc(c.roll_number) : ''}</p>
              </div>
            </div>
          </a>
        `).join('');
      }

      const today = new Date().toISOString().slice(0, 10);
      const upcomingCount = exams.filter(e => e.exam_date >= today).length;
      document.getElementById('stat-upcoming').textContent = upcomingCount;
      document.getElementById('stat-results').textContent = results.length;

      if (!exams.length) {
        renderEmpty(elExams, 'No upcoming exams scheduled.');
      } else {
        elExams.innerHTML = exams.map(e => {
          const d = new Date(e.exam_date);
          const isPast = e.exam_date < today;
          const day = d.toLocaleDateString('en-IN', { day: '2-digit' });
          const mon = d.toLocaleDateString('en-IN', { month: 'short' });
          const time = (e.start_time || e.end_time)
            ? `${e.start_time || '?'}${e.end_time ? ' – ' + e.end_time : ''}`
            : '';
          return `
            <div class="exam-card">
              <div class="date"><div class="day">${esc(day)}</div><div class="mon">${esc(mon)}</div></div>
              <div class="body">
                <div class="row1">
                  <h3>${esc(e.title)}</h3>
                  ${isPast ? '<span class="tag gray">Past</span>' : '<span class="tag sky">Upcoming</span>'}
                </div>
                <div class="meta">${esc(e.subject)} · ${esc(e.class_name)}${time ? ' · ' + esc(time) : ''}${e.max_marks ? ' · ' + esc(e.max_marks) + ' marks' : ''}</div>
                ${e.syllabus ? '<div class="syllabus">' + esc(e.syllabus) + '</div>' : ''}
              </div>
            </div>`;
        }).join('');
      }

      if (!results.length) {
        renderEmpty(elResults, 'No published results yet.');
      } else {
        elResults.innerHTML = results.map(r => {
          const pct = r.max_marks ? Math.round((r.marks_obtained / r.max_marks) * 100) : null;
          return `
            <div class="result-card">
              <div class="row1">
                <h3>${esc(r.title || r.subject)}</h3>
                <span class="tag">${esc(r.subject)}</span>
              </div>
              <div class="meta">${esc(r.student_name)} · ${esc(r.class_name)}${r.section ? ' · ' + esc(r.section) : ''} · ${esc(new Date(r.exam_date).toLocaleDateString('en-IN', { day: 'numeric', month: 'short' }))}</div>
              <div class="marks">
                <span class="val">${r.marks_obtained}</span>
                <span class="max">/ ${r.max_marks}${pct != null ? ' · ' + pct + '%' : ''}</span>
                ${r.grade ? '<span class="grade tag">' + esc(r.grade) + '</span>' : ''}
              </div>
              ${r.remarks ? '<div class="remarks">' + esc(r.remarks) + '</div>' : ''}
            </div>`;
        }).join('');
      }
    }

    document.getElementById('signoutLink').addEventListener('click', async (e) => {
      e.preventDefault();
      try { await fetch('/api/parent/auth', { method: 'DELETE', credentials: 'include' }); } catch (err) {}
      window.location.href = 'login.html';
    });

    load();
  </script>
</body>
</html>
