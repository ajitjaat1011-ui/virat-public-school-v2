<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Parent sign in · Virat Public School</title>
  <meta name="description" content="Sign in to view your child's exam schedule and results." />
  <meta name="theme-color" content="#ff3d80" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <link rel="manifest" href="/manifest.json" />
  <link rel="icon" type="image/svg+xml" href="/images/favicon.svg" />
  <link rel="apple-touch-icon" href="/images/icon-192.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="preload" as="style" onload="this.onload=null;this.rel='stylesheet'" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" />
  <link rel="stylesheet" href="/css/style.css?v=14" />
  <link rel="stylesheet" href="/css/components.css?v=2" />
  <style>
    body.has-dock .auth-wrap { min-height: calc(100vh - 90px); }
  </style>
</head>
<body>
  <a href="#main" class="skip-link">Skip to main content</a>
  <div id="vps-topbar"></div>
  <div id="vps-header"></div>

  <main id="main">
    <div class="auth-wrap">
      <div class="auth-card">
        <div class="logo">V</div>
        <h1>Parent sign in</h1>
        <p class="sub">Enter the mobile number and password you used during registration.</p>

        <form id="loginForm" class="form" novalidate>
          <div class="form-group">
            <label class="form-label" for="phone">Mobile number</label>
            <input class="form-input" type="tel" id="phone" name="phone" inputmode="numeric" pattern="[0-9]{10}" maxlength="10" required autocomplete="tel" placeholder="10-digit mobile" />
          </div>
          <div class="form-group password-field">
            <label class="form-label" for="password">Password</label>
            <input class="form-input" type="password" id="password" name="password" required autocomplete="current-password" minlength="6" placeholder="At least 6 characters" />
            <button type="button" class="password-toggle" data-password-toggle="password">Show</button>
          </div>
          <div id="loginError" class="form-error-banner" role="alert" aria-live="assertive"></div>
          <div id="loginStatus" class="form-status" role="status" aria-live="polite"></div>
          <button type="submit" class="btn btn-pink btn-lg" id="loginBtn">Sign in</button>
        </form>

        <p class="foot">
          New here? <a href="register.html">Request an account</a><br>
          <a href="../index.html" style="font-weight: 400;">← Back to site</a>
        </p>
      </div>
    </div>
  </main>

  <script src="/js/partials.js?v=12"></script>
  <script>
    (function () {
      const form = document.getElementById('loginForm');
      const errEl = document.getElementById('loginError');
      const statusEl = document.getElementById('loginStatus');
      const btn   = document.getElementById('loginBtn');

      document.querySelectorAll('[data-password-toggle]').forEach((toggle) => {
        toggle.addEventListener('click', () => {
          const input = document.getElementById(toggle.dataset.passwordToggle);
          const visible = input.type === 'text';
          input.type = visible ? 'password' : 'text';
          toggle.textContent = visible ? 'Show' : 'Hide';
        });
      });

      function showError(msg) { errEl.textContent = msg; errEl.classList.add('show'); statusEl.className = 'form-status'; }
      function clearError() { errEl.classList.remove('show'); errEl.textContent = ''; statusEl.className = 'form-status'; }
      document.getElementById('phone').addEventListener('input', (e) => { e.target.value = e.target.value.replace(/\D/g,'').slice(0,10); });

      fetch('/api/parent/auth', { credentials: 'include' })
        .then(r => r.ok ? r.json() : null)
        .then(d => { if (d && d.parent) window.location.href = 'dashboard.html'; });

      form.addEventListener('submit', async (e) => {
        e.preventDefault();
        clearError();
        const phone = document.getElementById('phone').value.trim().replace(/[^\d]/g, '');
        const password = document.getElementById('password').value;
        if (!/^\d{10}$/.test(phone)) { showError('Please enter a 10-digit mobile number.'); return; }
        if (!password || password.length < 6) { showError('Password must be at least 6 characters.'); return; }
        btn.disabled = true; btn.classList.add('is-loading'); btn.textContent = 'Signing in securely…';
        statusEl.textContent = 'Checking your account…'; statusEl.className = 'form-status show';
        try {
          const res = await fetch('/api/parent/auth', {
            method: 'POST',
            credentials: 'include',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ phone, password })
          });
          const data = await res.json();
          if (!res.ok) {
            if (res.status === 403 && /pending/i.test(data.error || '')) {
              window.location.href = 'pending.html';
              return;
            }
            showError(data.error || 'Sign in failed.');
            return;
          }
          statusEl.textContent = 'Signed in. Opening your dashboard…'; statusEl.className = 'form-status show';
          window.location.href = 'dashboard.html';
        } catch (err) {
          showError('Network error. Please try again.');
        } finally {
          btn.disabled = false; btn.classList.remove('is-loading'); btn.textContent = 'Sign in';
        }
      });
    })();
  </script>
  <script src="/js/i18n.js?v=1"></script>
</body>
</html>
