<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Dashboard · VPS Admin</title>
  <link rel="icon" type="image/svg+xml" href="/images/favicon.svg" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/css/admin.css?v=7" />
</head>
<body class="admin-body">
  <div id="app-root"></div>
  <div id="page-content" style="display:none;">
    <div class="page-head">
      <div>
        <h1>Welcome back</h1>
        <p>Here's what needs your attention today.</p>
      </div>
    </div>

    <div class="stat-grid" id="stat-grid">
      <a href="/admin/inquiries.html" class="stat-tile" id="card-inquiries">
        <div class="label">New inquiries</div>
        <div class="value">—</div>
        <div class="link">View →</div>
      </a>
      <a href="/admin/parents.html" class="stat-tile" id="card-parents">
        <div class="label">Parent requests</div>
        <div class="value">—</div>
        <div class="link">Review →</div>
      </a>
      <a href="/admin/messages.html" class="stat-tile" id="card-messages">
        <div class="label">Unread messages</div>
        <div class="value">—</div>
        <div class="link">View →</div>
      </a>
      <a href="/admin/exams.html" class="stat-tile" id="card-exams">
        <div class="label">Scheduled exams</div>
        <div class="value">—</div>
        <div class="link">Manage →</div>
      </a>
      <a href="/admin/notices.html" class="stat-tile" id="card-notices">
        <div class="label">Published notices</div>
        <div class="value">—</div>
        <div class="link">Manage →</div>
      </a>
      <a href="/admin/gallery.html" class="stat-tile" id="card-albums">
        <div class="label">Gallery albums</div>
        <div class="value">—</div>
        <div class="link">Manage →</div>
      </a>
    </div>

    <div class="dash-grid">
      <div class="glass-card">
        <h2 class="section-title">Recent inquiries</h2>
        <div id="recent-inquiries" class="recent-list">
          <p style="color:var(--ink-500); font-size:13px;">Loading…</p>
        </div>
      </div>
      <div class="glass-card">
        <h2 class="section-title">Recent activity</h2>
        <div id="recent-audit" class="recent-list">
          <p style="color:var(--ink-500); font-size:13px;">Loading…</p>
        </div>
      </div>
    </div>
  </div>

  <script>
    window.ADMIN_PAGE = { title: 'Dashboard', crumb: 'Overview' };
  </script>
  <script src="/js/admin.js?v=4"></script>
  <script>
    window.onShellReady = function () {
      const esc = s => String(s==null?'':s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'})[c]);
      const fmt = iso => iso ? new Date(iso).toLocaleString('en-IN', { day:'numeric', month:'short', hour:'2-digit', minute:'2-digit' }) : '—';

      fetch('/api/admin/dashboard', { credentials: 'include' })
        .then(r => r.ok ? r.json() : null)
        .then(data => {
          if (!data) return;
          const c = data.counts || {};
          document.querySelector('#card-inquiries .value').textContent  = c.newInquiries;
          document.querySelector('#card-parents .value').textContent   = c.parentRequests;
          document.querySelector('#card-messages .value').textContent  = c.unreadMessages;
          document.querySelector('#card-exams .value').textContent     = c.exams;
          document.querySelector('#card-notices .value').textContent  = c.notices;
          document.querySelector('#card-albums .value').textContent   = c.albums;
          if (c.newInquiries > 0) document.getElementById('card-inquiries').classList.add('alert');
          if (c.parentRequests > 0) document.getElementById('card-parents').classList.add('alert');

          const inq = data.recentInquiries || [];
          const inqEl = document.getElementById('recent-inquiries');
          if (inq.length) {
            inqEl.innerHTML = inq.map(i => `
              <a href="/admin/inquiries.html" class="recent-item">
                <div class="who">
                  <div class="name">${esc(i.parent_name)} · ${esc(i.student_name)}</div>
                  <div class="meta">${esc(i.class_seeking || '—')}</div>
                </div>
                <div class="when">${fmt(i.created_at)}</div>
              </a>
            `).join('');
          } else {
            inqEl.innerHTML = '<p style="color:var(--ink-500); font-size:13px;">No inquiries yet.</p>';
          }

          const aud = data.recentAudit || [];
          const audEl = document.getElementById('recent-audit');
          if (aud.length) {
            audEl.innerHTML = aud.slice(0, 8).map(a => `
              <div class="recent-item" style="cursor:default;">
                <div class="who">
                  <div class="name" style="font-size:13px;"><code>${esc(a.action)}</code> <span style="color:var(--ink-500);">· ${esc(a.entity || '—')}</span></div>
                  <div class="meta">${esc(a.username || 'system')}</div>
                </div>
                <div class="when">${fmt(a.created_at)}</div>
              </div>
            `).join('');
          } else {
            audEl.innerHTML = '<p style="color:var(--ink-500); font-size:13px;">No activity yet.</p>';
          }
        })
        .catch(() => {});
    };
  </script>
</body>
</html>
