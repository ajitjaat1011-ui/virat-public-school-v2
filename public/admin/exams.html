<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Exams · VPS Admin</title>
  <link rel="icon" type="image/svg+xml" href="/images/favicon.svg" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Fraunces:opsz,wght@9..144,500;9..144,600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/css/admin.css?v=5" />
  <style>
    .exam-row {
      background: var(--glass-bg);
      border: 1px solid var(--glass-border);
      border-radius: var(--r-md);
      padding: 18px 20px;
      margin-bottom: 10px;
      transition: border-color 0.15s, background 0.15s;
    }
    .exam-row:hover { border-color: var(--glass-border-strong); }
    .exam-row h3 { margin: 0 0 4px; font-family: 'Fraunces', serif; font-weight: 500; font-size: 16px; color: var(--ink-1); }
    .exam-row .meta { font-size: 12px; color: var(--ink-3); }
    .exam-row .actions { display: flex; gap: 6px; margin-top: 12px; flex-wrap: wrap; }
    .result-row { display: grid; grid-template-columns: 2fr 0.8fr 0.6fr 0.8fr 0.6fr 24px; gap: 6px; margin-bottom: 6px; align-items: center; }
    .result-row input {
      width: 100%; padding: 6px 8px;
      background: rgba(0,0,0,0.2);
      border: 1px solid var(--glass-border);
      border-radius: 6px;
      color: var(--ink-1);
      font: inherit; font-size: 13px;
    }
    .result-row input:focus { outline: none; border-color: var(--accent); }
    .result-row .head { font-size: 11px; color: var(--ink-3); font-weight: 600; text-transform: uppercase; letter-spacing: 0.04em; padding: 0 4px; }
    .result-row .remove { background: transparent; border: none; cursor: pointer; color: var(--ink-3); font-size: 16px; padding: 0; }
    .result-row .remove:hover { color: var(--rose-light); }
    .add-row { display: inline-flex; align-items: center; gap: 4px; font-size: 13px; color: var(--accent-light); cursor: pointer; padding: 8px 0; background: none; border: none; font: inherit; }
    .add-row:hover { color: var(--ink-1); }
    .msg { padding: 10px 14px; border-radius: var(--r-sm); font-size: 13px; margin-top: 8px; }
    .msg.ok { background: rgba(47,158,107,0.18); color: #6ee7b7; border: 1px solid rgba(110,231,183,0.3); }
    .msg.err { background: rgba(242,90,130,0.15); color: var(--rose-light); border: 1px solid rgba(242,90,130,0.3); }
  </style>
</head>
<body class="admin-body">
  <div id="app-root"></div>
  <div id="page-content" style="display:none;">
    <div class="page-head">
      <div>
        <h1>Exams & results</h1>
        <p>Schedule exams and upload student results. Parents see them in their portal.</p>
      </div>
      <button class="btn btn-primary" id="newExamBtn">+ New exam</button>
    </div>
    <div id="list"><p style="color:var(--ink-3);">Loading…</p></div>
  </div>

  <!-- New exam modal -->
  <div class="modal-backdrop" id="newModal">
    <div class="modal">
      <h2>Schedule a new exam</h2>
      <form id="newForm" class="form">
        <div class="form-group">
          <label class="form-label">Title</label>
          <input name="title" required placeholder="e.g. Mid-Term Mathematics" />
        </div>
        <div class="form-row">
          <div class="form-group">
            <label class="form-label">Class</label>
            <input name="class_name" required placeholder="e.g. Class 5" />
          </div>
          <div class="form-group">
            <label class="form-label">Subject</label>
            <input name="subject" required placeholder="e.g. Mathematics" />
          </div>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label class="form-label">Date</label>
            <input name="exam_date" type="date" required />
          </div>
          <div class="form-group">
            <label class="form-label">Max marks</label>
            <input name="max_marks" type="number" min="1" placeholder="e.g. 100" />
          </div>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label class="form-label">Start time</label>
            <input name="start_time" type="time" />
          </div>
          <div class="form-group">
            <label class="form-label">End time</label>
            <input name="end_time" type="time" />
          </div>
        </div>
        <div class="form-group">
          <label class="form-label">Syllabus / notes (optional)</label>
          <textarea name="syllabus" rows="3" placeholder="e.g. Chapters 1–4, bring geometry box"></textarea>
        </div>
        <div id="newError" class="msg err" style="display:none;"></div>
        <div class="modal-actions">
          <button type="button" class="btn btn-ghost" id="cancelNew">Cancel</button>
          <button type="submit" class="btn btn-primary">Save exam</button>
        </div>
      </form>
    </div>
  </div>

  <!-- Results modal -->
  <div class="modal-backdrop" id="resultsModal">
    <div class="modal">
      <h2 id="resultsTitle">Upload results</h2>
      <p class="modal-sub">Add marks for each student. Existing entries with matching name/roll will be updated.</p>
      <div id="resultsList"></div>
      <button class="add-row" id="addResultRow" type="button">+ Add another student</button>
      <div id="resultsMsg" style="display:none; margin-top: 12px;"></div>
      <div class="modal-actions">
        <button type="button" class="btn btn-ghost" id="cancelResults">Close</button>
        <button type="button" class="btn btn-primary" id="saveResults">Save results</button>
      </div>
    </div>
  </div>

  <script>
    window.ADMIN_PAGE = { title: 'Exams', crumb: 'Academics' };
  </script>
  <script src="/js/admin.js?v=1"></script>
  <script>
    const esc = s => String(s==null?'':s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'})[c]);
    const fmt = iso => iso ? new Date(iso).toLocaleDateString('en-IN', { day:'numeric', month:'short', year:'numeric' }) : '';

    const list = document.getElementById('list');
    const newModal = document.getElementById('newModal');
    const resultsModal = document.getElementById('resultsModal');
    const resultsList = document.getElementById('resultsList');
    const resultsTitle = document.getElementById('resultsTitle');
    let currentExamId = null;

    async function load() {
      list.innerHTML = '<p style="color:var(--ink-3);">Loading…</p>';
      const res = await fetch('/api/admin/exams', { credentials: 'include' });
      if (!res.ok) { list.innerHTML = '<p style="color:var(--rose-light);">Failed to load.</p>'; return; }
      const data = await res.json();
      const exams = data.exams || [];
      if (!exams.length) {
        list.innerHTML = '<div class="empty-state"><h3>No exams yet</h3><p>Click "+ New exam" to schedule one.</p></div>';
        return;
      }
      list.innerHTML = exams.map(e => `
        <div class="exam-row" data-id="${esc(e.id)}">
          <div style="display:flex; justify-content:space-between; align-items:baseline; gap:12px; flex-wrap:wrap;">
            <div>
              <h3>${esc(e.title)}</h3>
              <div class="meta">${esc(e.class_name)} · ${esc(e.subject)} · ${fmt(e.exam_date)}${e.start_time ? ' · ' + esc(e.start_time) + (e.end_time ? '–' + esc(e.end_time) : '') : ''}${e.max_marks ? ' · ' + esc(e.max_marks) + ' marks' : ''}</div>
            </div>
            <div>${e.is_published ? '<span class="pill pill-pub">Published</span>' : '<span class="pill pill-draft">Draft</span>'}</div>
          </div>
          ${e.syllabus ? `<div style="font-size:13px; color:var(--ink-2); margin-top: 8px;">${esc(e.syllabus)}</div>` : ''}
          <div class="meta" style="margin-top:8px;">${e.result_count} result(s) uploaded</div>
          <div class="actions">
            <button class="btn btn-primary btn-sm" data-act="results">${e.result_count ? 'Edit results' : 'Upload results'}</button>
            <button class="btn btn-ghost btn-sm" data-act="toggle">${e.is_published ? 'Unpublish' : 'Publish'}</button>
            <button class="btn btn-ghost btn-sm btn-danger" data-act="delete" style="margin-left:auto;">Delete</button>
          </div>
        </div>
      `).join('');

      list.querySelectorAll('.exam-row').forEach(row => {
        const id = row.dataset.id;
        row.querySelectorAll('[data-act]').forEach(btn => {
          btn.addEventListener('click', async () => {
            const act = btn.dataset.act;
            if (act === 'delete' && !confirm('Delete this exam and all its results?')) return;
            if (act === 'results') { openResults(id); return; }
            if (act === 'toggle') {
              const r = await fetch('/api/admin/exams/' + id, { credentials: 'include' });
              const d = await r.json();
              await fetch('/api/admin/exams/' + id, {
                method: 'POST', credentials: 'include',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ is_published: !d.exam.is_published })
              });
              toast(d.exam.is_published ? 'Unpublished' : 'Published');
              load();
              return;
            }
            if (act === 'delete') {
              await fetch('/api/admin/exams/' + id, { method: 'DELETE', credentials: 'include' });
              toast('Exam deleted');
              load();
            }
          });
        });
      });
    }

    function bindUI() {
      document.getElementById('newExamBtn').addEventListener('click', () => {
        document.getElementById('newForm').reset();
        const errEl = document.getElementById('newError'); errEl.style.display = 'none';
        newModal.classList.add('open');
      });
      document.getElementById('cancelNew').addEventListener('click', () => newModal.classList.remove('open'));
      newModal.addEventListener('click', e => { if (e.target === newModal) newModal.classList.remove('open'); });

      document.getElementById('newForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const form = e.target;
        const data = Object.fromEntries(new FormData(form).entries());
        const errEl = document.getElementById('newError');
        errEl.style.display = 'none';
        data.is_published = true;
        if (data.max_marks) data.max_marks = Number(data.max_marks);
        const res = await fetch('/api/admin/exams', {
          method: 'POST', credentials: 'include',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(data)
        });
        const out = await res.json();
        if (!res.ok) { errEl.textContent = out.error || 'Failed'; errEl.style.display = 'block'; return; }
        newModal.classList.remove('open');
        toast('Exam scheduled');
        load();
      });

      document.getElementById('addResultRow').addEventListener('click', () => addResultRow());
      document.getElementById('cancelResults').addEventListener('click', () => resultsModal.classList.remove('open'));
      resultsModal.addEventListener('click', e => { if (e.target === resultsModal) resultsModal.classList.remove('open'); });

      document.getElementById('saveResults').addEventListener('click', async () => {
        const rows = resultsList.querySelectorAll('.result-row');
        const out = [];
        rows.forEach(r => {
          if (r.querySelector('.head')) return;
          const name = r.querySelector('.r-name').value.trim();
          const marks = parseFloat(r.querySelector('.r-marks').value);
          if (!name || isNaN(marks)) return;
          out.push({
            student_name: name,
            roll_number: r.querySelector('.r-roll').value.trim(),
            section: r.querySelector('.r-section').value.trim(),
            marks_obtained: marks,
            grade: r.querySelector('.r-grade').value.trim()
          });
        });
        if (!out.length) { alert('Add at least one student with marks.'); return; }
        const res = await fetch('/api/admin/exam-results', {
          method: 'POST', credentials: 'include',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ exam_id: currentExamId, results: out })
        });
        const data = await res.json();
        const msg = document.getElementById('resultsMsg');
        if (!res.ok) {
          msg.textContent = data.error || 'Failed to save';
          msg.className = 'msg err';
          msg.style.display = 'block';
          return;
        }
        msg.textContent = `Saved. ${data.inserted} added, ${data.updated} updated.`;
        msg.className = 'msg ok';
        msg.style.display = 'block';
        toast('Results saved');
        load();
      });
    }

    function resultRow(r) {
      r = r || {};
      return `<div class="result-row">
        <input class="r-name" placeholder="Student name" value="${esc(r.student_name||'')}" />
        <input class="r-roll" placeholder="Roll" value="${esc(r.roll_number||'')}" />
        <input class="r-section" placeholder="Sec" value="${esc(r.section||'')}" maxlength="5" />
        <input class="r-marks" type="number" step="0.01" placeholder="Marks" value="${esc(r.marks_obtained!=null?r.marks_obtained:'')}" />
        <input class="r-grade" placeholder="Grade" value="${esc(r.grade||'')}" />
        <button type="button" class="remove" aria-label="Remove">×</button>
      </div>`;
    }
    function addResultRow(r) {
      const wrapper = document.createElement('div');
      wrapper.innerHTML = resultRow(r);
      const el = wrapper.firstElementChild;
      el.querySelector('.remove').addEventListener('click', () => el.remove());
      resultsList.appendChild(el);
    }

    async function openResults(id) {
      currentExamId = id;
      const res = await fetch('/api/admin/exams/' + id, { credentials: 'include' });
      const data = await res.json();
      const exam = data.exam;
      const existing = data.results || [];
      resultsTitle.textContent = `Results — ${exam.title}`;
      resultsList.innerHTML = `<div class="result-row"><div class="head">Student</div><div class="head">Roll</div><div class="head">Sec</div><div class="head">Marks</div><div class="head">Grade</div><div></div></div>`;
      if (existing.length) existing.forEach(r => addResultRow(r));
      else addResultRow();
      const msg = document.getElementById('resultsMsg');
      msg.style.display = 'none';
      resultsModal.classList.add('open');
    }

    window.onShellReady = function () {
      bindUI();
      load();
    };
  </script>
</body>
</html>
