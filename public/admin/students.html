<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Students · VPS Admin</title>
  <link rel="icon" type="image/svg+xml" href="/images/favicon.svg" />
  <link rel="stylesheet" href="/css/admin.css?v=10" />
  <style>
    .student-toolbar { display:flex; gap:10px; flex-wrap:wrap; margin-bottom:16px; }
    .student-toolbar > * { flex:1 1 180px; }
    .student-form { margin-bottom:20px; }
    .student-table-wrap { overflow-x:auto; background:white; border:1px solid var(--line); border-radius:16px; }
    .student-table { width:100%; border-collapse:collapse; min-width:650px; }
    .student-table th, .student-table td { padding:12px 14px; text-align:left; border-bottom:1px solid var(--line-2); font-size:13px; }
    .student-table th { color:var(--ink-500); font-size:11px; text-transform:uppercase; letter-spacing:.06em; }
    .student-table tr:last-child td { border-bottom:0; }
    .student-table .actions { white-space:nowrap; }
  </style>
</head>
<body class="admin-body">
  <div id="app-root"></div>
  <div id="page-content" style="display:none;">
    <div class="page-head"><div><h1>Student master list</h1><p>Add each student once. Results can reuse this list later.</p></div></div>
    <div class="glass-card student-form">
      <h2 class="section-title" id="form-title">Add student</h2>
      <form id="student-form">
        <div class="form-row">
          <div class="form-group"><label class="form-label">Student name</label><input class="form-input" id="full_name" required placeholder="e.g. Arvind Jaat" /></div>
          <div class="form-group"><label class="form-label">Admission number</label><input class="form-input" id="admission_number" placeholder="Optional" /></div>
        </div>
        <div class="form-row">
          <div class="form-group"><label class="form-label">Class</label><select class="form-select" id="class_name" required></select></div>
          <div class="form-group"><label class="form-label">Section</label><select class="form-select" id="section"></select></div>
        </div>
        <div class="form-row">
          <div class="form-group"><label class="form-label">Roll number</label><input class="form-input" id="roll_number" placeholder="Optional" /></div>
          <div class="form-group"><label class="form-label">Date of birth</label><input class="form-input" type="date" id="dob" /></div>
        </div>
        <button class="btn btn-primary" type="submit" id="save-btn">Add student</button>
        <button class="btn btn-ghost" type="button" id="cancel-btn" hidden>Cancel edit</button>
      </form>
    </div>
    <div class="student-toolbar"><select class="form-select" id="filter-class"></select><button class="btn btn-secondary" id="refresh-btn" type="button">Refresh list</button></div>
    <div id="student-list"><div class="empty-state"><p>Loading…</p></div></div>
  </div>
  <script>window.ADMIN_PAGE = { title: 'Students', crumb: 'Academics' };</script>
  <script src="/js/admin.js?v=5"></script>
  <script>
    const classes = window.PICKERS.classes;
    let editingId = null;
    const esc = s => String(s == null ? '' : s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'})[c]);
    const val = id => document.getElementById(id).value.trim();
    function options(list, first) { return `<option value="">${first}</option>` + list.map(x => `<option>${esc(x)}</option>`).join(''); }
    function resetForm() { editingId=null; document.getElementById('student-form').reset(); document.getElementById('form-title').textContent='Add student'; document.getElementById('save-btn').textContent='Add student'; document.getElementById('cancel-btn').hidden=true; }
    async function loadStudents() {
      const filter = val('filter-class');
      const r = await fetch('/api/admin/students' + (filter ? '?class_name=' + encodeURIComponent(filter) : ''), {credentials:'include'});
      const d = await r.json(); const rows = d.students || []; const el=document.getElementById('student-list');
      if (!rows.length) { el.innerHTML='<div class="empty-state"><h3>No students yet</h3><p>Add the first student above.</p></div>'; return; }
      el.innerHTML='<div class="student-table-wrap"><table class="student-table"><thead><tr><th>Name</th><th>Admission no.</th><th>Class</th><th>Section</th><th>Roll no.</th><th>Actions</th></tr></thead><tbody>' + rows.map(s => `<tr><td><strong>${esc(s.full_name)}</strong></td><td>${esc(s.admission_number || '—')}</td><td>${esc(s.class_name)}</td><td>${esc(s.section || '—')}</td><td>${esc(s.roll_number || '—')}</td><td class="actions"><button class="btn btn-sm btn-ghost edit" data-student='${esc(JSON.stringify(s))}'>Edit</button><button class="btn btn-sm btn-danger delete" data-id="${esc(s.id)}">Delete</button></td></tr>`).join('')+'</tbody></table></div>';
      el.querySelectorAll('.edit').forEach(b=>b.onclick=()=>editStudent(JSON.parse(b.dataset.student)));
      el.querySelectorAll('.delete').forEach(b=>b.onclick=async()=>{if(!confirm('Delete this student from the master list?'))return; await fetch('/api/admin/students/'+encodeURIComponent(b.dataset.id),{method:'DELETE',credentials:'include'}); loadStudents();});
    }
    function editStudent(s) { editingId=s.id; ['full_name','admission_number','class_name','section','roll_number','dob'].forEach(k=>document.getElementById(k).value=s[k]||''); document.getElementById('form-title').textContent='Edit student'; document.getElementById('save-btn').textContent='Save changes'; document.getElementById('cancel-btn').hidden=false; window.scrollTo({top:0,behavior:'smooth'}); }
    window.onShellReady=function(){
      document.getElementById('class_name').innerHTML=options(classes,'Select class'); document.getElementById('filter-class').innerHTML=options(classes,'All classes'); document.getElementById('section').innerHTML=options(window.PICKERS.sections,'No section');
      document.getElementById('student-form').onsubmit=async e=>{e.preventDefault(); const payload={full_name:val('full_name'),admission_number:val('admission_number'),class_name:val('class_name'),section:val('section'),roll_number:val('roll_number'),dob:val('dob')}; const r=await fetch('/api/admin/students'+(editingId?'/'+editingId:''),{method:editingId?'POST':'POST',headers:{'content-type':'application/json'},credentials:'include',body:JSON.stringify(payload)}); const d=await r.json(); if(!r.ok){toast(d.error||'Could not save student','error');return;} toast(editingId?'Student updated':'Student added'); resetForm(); loadStudents();};
      document.getElementById('cancel-btn').onclick=resetForm; document.getElementById('filter-class').onchange=loadStudents; document.getElementById('refresh-btn').onclick=loadStudents; loadStudents();
    };
  </script>
</body>
</html>
