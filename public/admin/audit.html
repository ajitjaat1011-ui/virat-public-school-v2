<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Audit · VPS Admin</title>
  <link rel="icon" type="image/svg+xml" href="/images/favicon.svg" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="preload" as="style" onload="this.onload=null;this.rel='stylesheet'" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" />
  <link rel="stylesheet" href="/css/admin.css?v=12" />
</head>
<body class="admin-body">
  <div id="app-root"></div>
  <div id="page-content" style="display:none;">
    <div class="page-head">
      <div>
        <h1>Audit log</h1>
        <p>Every admin action is recorded here for accountability.</p>
      </div>
    </div>
    <div id="list"><p style="color:var(--ink-500);">Loading…</p></div>
  </div>

  <script>
    window.ADMIN_PAGE = { title: 'Audit log', crumb: 'System' };
  </script>
  <script src="/js/admin.js?v=7"></script>
  <script>
    const esc = s => String(s==null?'':s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'})[c]);
    const fmt = iso => iso ? new Date(iso).toLocaleString('en-IN', { day:'numeric', month:'short', hour:'2-digit', minute:'2-digit' }) : '';

    async function load() {
      try {
        const r = await fetch('/api/admin/audit', { credentials: 'include' });
        if (r.status === 401) { location.href = '/admin/login.html'; return; }
        const d = await r.json();
        const list = d.audit || d.entries || d.results || [];
        render(list);
      } catch (e) {
        document.getElementById('list').innerHTML = '<div class="empty-state"><h3>Could not load</h3></div>';
      }
    }

    function render(items) {
      const el = document.getElementById('list');
      if (!items.length) {
        el.innerHTML = '<div class="empty-state"><h3>No activity yet</h3><p>Admin actions will appear here.</p></div>';
        return;
      }
      el.innerHTML = items.map((a) => `
        <div class="list-item">
          <div class="body">
            <div><code style="background:var(--pink-50); color:var(--pink-700); padding:2px 8px; border-radius:4px; font-size:12px; font-family: 'SF Mono', Menlo, monospace;">${esc(a.action)}</code> <span style="color:var(--ink-500); font-size:13px;">· ${esc(a.entity || '—')}</span></div>
            <div class="meta" style="font-size:12px; color:var(--ink-500); display: flex; gap: 8px; align-items: center; flex-wrap: wrap; margin-top: 2px;">
              <span>${esc(a.username || 'system')}</span>
              ${a.ip ? '<span>·</span><span>' + esc(a.ip) + '</span>' : ''}
            </div>
          </div>
          <div class="when" style="font-size: 12px; color: var(--ink-500);">${fmt(a.created_at)}</div>
        </div>`).join('');
    }

    window.onShellReady = load;
  </script>
  <script src="/js/i18n.js?v=1"></script>
</body>
</html>
