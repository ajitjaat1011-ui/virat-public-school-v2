<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Notices · VPS Admin</title>
  <link rel="icon" type="image/svg+xml" href="/images/favicon.svg" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/css/admin.css?v=8" />
</head>
<body class="admin-body">
  <div id="app-root"></div>
  <div id="page-content" style="display:none;">
    <div class="page-head">
      <div>
        <h1>Notices</h1>
        <p>Publish announcements, exam schedules, and holiday lists.</p>
      </div>
      <button class="btn btn-primary" id="new-btn">+ New notice</button>
    </div>

    <div class="filter-bar">
      <button class="filter-btn active" data-filter="">All</button>
      <button class="filter-btn" data-filter="GENERAL">General</button>
      <button class="filter-btn" data-filter="ADMISSION">Admission</button>
      <button class="filter-btn" data-filter="EXAM">Exam</button>
      <button class="filter-btn" data-filter="HOLIDAY">Holiday</button>
      <button class="filter-btn" data-filter="PTM">PTM</button>
    </div>

    <div id="list">
      <p style="color:var(--ink-500);">Loading…</p>
    </div>
  </div>

  <!-- Modal: edit notice -->
  <div class="modal-backdrop" id="edit-modal">
    <div class="modal" style="max-width: 640px;">
      <h2 id="edit-title">New notice</h2>
      <p class="modal-sub">Will be visible on the public site immediately when published.</p>
      <form id="edit-form">
        <input type="hidden" id="edit-id" />
        <div class="form-group">
          <label class="form-label">Title</label>
          <input id="edit-title-input" required maxlength="200" placeholder="e.g. Parent-teacher meeting on Saturday" />
        </div>
        <div class="form-row">
          <div class="form-group">
            <label class="form-label">Category</label>
            <select id="edit-category" required>
              <option value="GENERAL">General</option>
              <option value="ADMISSION">Admission</option>
              <option value="EXAM">Exam</option>
              <option value="HOLIDAY">Holiday</option>
              <option value="PTM">PTM</option>
            </select>
          </div>
          <div class="form-group">
            <label class="form-label">Publish date</label>
            <input id="edit-publish" type="datetime-local" />
          </div>
        </div>
        <div class="form-group">
          <label class="form-label">Body (HTML allowed)</label>
          <textarea id="edit-body" rows="6" required></textarea>
          <div class="form-help">Allowed: p, br, strong, em, ul, ol, li, a, h3, h4</div>
        </div>
        <div class="form-group" style="flex-direction:row;align-items:center;gap:8px;">
          <input type="checkbox" id="edit-published" style="width:18px;height:18px;" />
          <label class="form-label" for="edit-published" style="margin:0;">Published (visible on site)</label>
        </div>
        <div id="edit-err" class="form-error"></div>
        <div class="modal-actions">
          <button type="button" class="btn btn-ghost" id="cancel-btn">Cancel</button>
          <button type="submit" class="btn btn-primary" id="save-btn">Save notice</button>
        </div>
      </form>
    </div>
  </div>

  <script>
    window.ADMIN_PAGE = { title: 'Notices', crumb: 'Manage' };
  </script>
  <script src="/js/admin.js?v=4"></script>
  <script>
    const esc = s => String(s==null?'':s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'})[c]);
    const fmt = iso => iso ? new Date(iso).toLocaleDateString('en-IN', { day:'numeric', month:'short', year:'numeric' }) : '';

    let notices = [];
    let currentFilter = '';

    async function load() {
      const el = document.getElementById('list');
      try {
        const r = await fetch('/api/admin/notices', { credentials: 'include' });
        if (r.status === 401) { location.href = '/admin/login.html'; return; }
        const d = await r.json();
        notices = d.notices || [];
        render();
      } catch (e) {
        el.innerHTML = '<p style="color:var(--pink-600);">Could not load.</p>';
      }
    }

    function render() {
      const el = document.getElementById('list');
      const filtered = currentFilter ? notices.filter(n => n.category === currentFilter) : notices;
      if (!filtered.length) {
        el.innerHTML = '<div class="empty-state"><h3>No notices</h3><p>Click "+ New notice" to create one.</p></div>';
        return;
      }
      el.innerHTML = filtered.map(n => `
        <div class="list-item">
          <div class="body">
            <div class="title">${esc(n.title)}</div>
            <div class="meta">
              <span class="pill pill-info">${esc(n.category)}</span>
              ${n.is_published ? '<span class="pill pill-pub">Published</span>' : '<span class="pill pill-draft">Draft</span>'}
              <span>${fmt(n.publish_date)}</span>
            </div>
          </div>
          <div class="actions">
            <button class="btn btn-ghost btn-sm" data-action="edit" data-id="${esc(n.id)}">Edit</button>
            <button class="btn btn-ghost btn-sm" data-action="toggle" data-id="${esc(n.id)}">${n.is_published ? 'Unpublish' : 'Publish'}</button>
            <button class="btn btn-ghost btn-sm btn-danger" data-action="delete" data-id="${esc(n.id)}">Delete</button>
          </div>
        </div>
      `).join('');
      el.querySelectorAll('[data-action]').forEach(b => {
        b.addEventListener('click', () => {
          const id = b.dataset.id;
          if (b.dataset.action === 'edit') openEdit(notices.find(x => x.id === id));
          else if (b.dataset.action === 'toggle') togglePublish(id);
          else if (b.dataset.action === 'delete') del(id);
        });
      });
    }

    function openEdit(n) {
      document.getElementById('edit-id').value = n ? n.id : '';
      document.getElementById('edit-title-input').value = n ? n.title : '';
      document.getElementById('edit-category').value = n ? n.category : 'GENERAL';
      document.getElementById('edit-publish').value = n && n.publish_date ? n.publish_date.replace(' ', 'T').slice(0, 16) : new Date().toISOString().slice(0, 16);
      document.getElementById('edit-body').value = n ? n.body : '';
      document.getElementById('edit-published').checked = n ? !!n.is_published : true;
      document.getElementById('edit-title').textContent = n ? 'Edit notice' : 'New notice';
      document.getElementById('edit-err').classList.remove('show');
      document.getElementById('edit-modal').classList.add('open');
    }

    function bindUI() {
      document.getElementById('new-btn').addEventListener('click', () => openEdit(null));
      document.getElementById('cancel-btn').addEventListener('click', () => document.getElementById('edit-modal').classList.remove('open'));
      document.getElementById('edit-modal').addEventListener('click', e => { if (e.target.id === 'edit-modal') e.target.classList.remove('open'); });
      document.querySelectorAll('.filter-btn').forEach(btn => {
        btn.addEventListener('click', () => {
          document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
          btn.classList.add('active');
          currentFilter = btn.dataset.filter;
          render();
        });
      });
      document.getElementById('edit-form').addEventListener('submit', async (e) => {
        e.preventDefault();
        const id = document.getElementById('edit-id').value;
        const data = {
          title: document.getElementById('edit-title-input').value,
          category: document.getElementById('edit-category').value,
          body: document.getElementById('edit-body').value,
          is_published: document.getElementById('edit-published').checked ? 1 : 0,
          publish_date: new Date(document.getElementById('edit-publish').value).toISOString()
        };
        const btn = document.getElementById('save-btn');
        btn.disabled = true; btn.textContent = 'Saving…';
        try {
          const r = id
            ? await fetch('/api/admin/notices/' + id, { method: 'POST', credentials: 'include', headers: { 'content-type': 'application/json' }, body: JSON.stringify(data) })
            : await fetch('/api/admin/notices', { method: 'POST', credentials: 'include', headers: { 'content-type': 'application/json' }, body: JSON.stringify(data) });
          const out = await r.json().catch(() => ({}));
          if (!r.ok || !out.ok) {
            const e2 = document.getElementById('edit-err');
            e2.textContent = out.error || 'Could not save';
            e2.classList.add('show');
            return;
          }
          document.getElementById('edit-modal').classList.remove('open');
          toast('Notice saved');
          load();
        } catch (err) {
          const e2 = document.getElementById('edit-err');
          e2.textContent = 'Network error';
          e2.classList.add('show');
        } finally {
          btn.disabled = false; btn.textContent = 'Save notice';
        }
      });
    }

    async function togglePublish(id) {
      const n = notices.find(x => x.id === id);
      if (!n) return;
      try {
        const r = await fetch('/api/admin/notices/' + id, {
          method: 'POST', credentials: 'include',
          headers: { 'content-type': 'application/json' },
          body: JSON.stringify({ is_published: n.is_published ? 0 : 1 })
        });
        if (!r.ok) throw new Error('Failed');
        toast(n.is_published ? 'Unpublished' : 'Published');
        load();
      } catch (e) { toast(e.message, 'error'); }
    }

    async function del(id) {
      if (!confirm('Delete this notice?')) return;
      try {
        const r = await fetch('/api/admin/notices/' + id, { method: 'DELETE', credentials: 'include' });
        if (!r.ok) throw new Error('Failed');
        toast('Notice deleted');
        load();
      } catch (e) { toast(e.message, 'error'); }
    }

    window.onShellReady = function () {
      bindUI();
      load();
    };
  </script>
</body>
</html>
