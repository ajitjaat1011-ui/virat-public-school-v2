<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Admin Login | Virat Public School</title>
  <link rel="icon" type="image/svg+xml" href="/images/favicon.svg" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/css/admin.css?v=2" />
</head>
<body class="admin-body">
  <main>
    <div class="login-wrap">
      <div class="login-card">
        <div class="brand-soft">
          <div class="logo">V</div>
          <div>
            <div class="name">Virat Public School</div>
            <div class="sub">Admin panel</div>
          </div>
        </div>
        <h1>Sign in</h1>
        <p class="sub">Manage school content</p>

        <form id="login-form" novalidate>
          <div class="form-group">
            <label class="form-label" for="username">Username</label>
            <input type="text" id="username" name="username" class="form-control" required autocomplete="username" autofocus />
          </div>
          <div class="form-group">
            <label class="form-label" for="password">Password</label>
            <input type="password" id="password" name="password" class="form-control" required autocomplete="current-password" />
          </div>
          <div id="login-error" class="alert-error" hidden></div>
          <button type="submit" class="btn btn-accent btn-block btn-lg" id="login-btn">Sign in</button>
        </form>
        <p style="text-align:center;font-size:12px;color:var(--ink-500);margin-top:20px;">
          <a href="/">← Back to website</a>
        </p>
      </div>
    </div>
  </main>

  <script>
    document.getElementById('login-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const err = document.getElementById('login-error');
      err.hidden = true;
      const username = document.getElementById('username').value.trim();
      const password = document.getElementById('password').value;
      const btn = document.getElementById('login-btn');
      btn.disabled = true; btn.textContent = 'Signing in…';
      try {
        const r = await fetch('/api/admin/auth', {
          method: 'POST',
          headers: { 'content-type': 'application/json' },
          body: JSON.stringify({ username, password })
        });
        const d = await r.json();
        if (!r.ok || !d.ok) {
          err.textContent = (d && d.error) || 'Invalid username or password';
          err.hidden = false;
          return;
        }
        location.href = '/admin/index.html';
      } catch (e) {
        err.textContent = 'Network error. Please try again.';
        err.hidden = false;
      } finally {
        btn.disabled = false; btn.textContent = 'Sign in';
      }
    });
  </script>
</body>
</html>
