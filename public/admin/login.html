<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Sign in · VPS Admin</title>
  <link rel="icon" type="image/svg+xml" href="/images/favicon.svg" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="preload" as="style" onload="this.onload=null;this.rel='stylesheet'" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" />
  <link rel="stylesheet" href="/css/admin.css?v=11" />
  <style>
    body { display: flex; align-items: center; justify-content: center; min-height: 100vh; padding: 24px; }
    body::before, body::after { display: none; }
    .login-card {
      width: 100%; max-width: 400px;
      padding: 32px;
      background: white;
      border: 1px solid var(--line);
      border-radius: 24px;
      box-shadow: 0 20px 60px rgba(255, 61, 128, 0.12);
    }
    .login-card .brand {
      display: flex; align-items: center; gap: 12px;
      margin-bottom: 24px;
      padding-bottom: 20px;
      border-bottom: 1px solid var(--line);
    }
    .login-card .brand .logo {
      width: 44px; height: 44px;
      border-radius: 12px;
      background: linear-gradient(135deg, var(--pink-400), var(--sky-400));
      color: white;
      display: grid; place-items: center;
      font-weight: 700; font-size: 20px;
      box-shadow: 0 4px 12px rgba(255, 107, 157, 0.3);
    }
    .login-card .brand .name { font-weight: 700; color: var(--ink-900); font-size: 15px; }
    .login-card .brand .sub { font-size: 12px; color: var(--ink-500); }
    .login-card h1 { margin: 0 0 6px; font-family: inherit; font-weight: 800; font-size: 24px; color: var(--ink-900); letter-spacing: -0.02em; }
    .login-card .hint { color: var(--ink-500); font-size: 13px; margin: 0 0 20px; }
    .login-card .btn-primary { width: 100%; justify-content: center; }
    .login-card .back { text-align: center; margin-top: 16px; font-size: 12px; }
    .login-card .back a { color: var(--ink-500); text-decoration: none; }
    .login-card .back a:hover { color: var(--pink-600); }
  </style>
</head>
<body class="admin-body">
  <div class="login-card">
    <div class="brand">
      <div class="logo">V</div>
      <div>
        <div class="name">Virat Public School</div>
        <div class="sub">Admin panel</div>
      </div>
    </div>
    <h1>Sign in</h1>
    <p class="hint">Manage school content, parents, exams, and results.</p>
    <form id="login-form" novalidate>
      <div class="form-group">
        <label class="form-label" for="username">Username</label>
        <input type="text" id="username" name="username" required autocomplete="username" autofocus />
      </div>
      <div class="form-group">
        <label class="form-label" for="password">Password</label>
        <input type="password" id="password" name="password" required autocomplete="current-password" />
      </div>
      <div id="login-error" class="form-error-banner" role="alert" aria-live="assertive"></div>
      <div id="login-status" class="form-status" role="status" aria-live="polite"></div>
      <button type="submit" class="btn btn-primary btn-lg" id="login-btn" style="width:100%;">Sign in</button>
    </form>
    <p class="back"><a href="/">← Back to website</a></p>
  </div>

  <script>
    document.getElementById('login-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const err = document.getElementById('login-error');
      const status = document.getElementById('login-status');
      const btn = document.getElementById('login-btn');
      if (btn.disabled) return;
      err.classList.remove('show');
      status.className = 'form-status';
      const username = document.getElementById('username').value.trim();
      const password = document.getElementById('password').value;
      if (!username || !password) {
        err.textContent = 'Enter both username and password.';
        err.classList.add('show');
        (!username ? document.getElementById('username') : document.getElementById('password')).focus();
        return;
      }
      btn.disabled = true; btn.classList.add('is-loading'); btn.textContent = 'Signing in securely…';
      status.textContent = 'Checking your credentials…'; status.className = 'form-status show';
      try {
        const r = await fetch('/api/admin/auth', {
          method: 'POST',
          headers: { 'content-type': 'application/json' },
          credentials: 'include',
          body: JSON.stringify({ username, password })
        });
        const d = await r.json();
        if (!r.ok || !d.user) {
          status.className = 'form-status';
          err.textContent = (d && d.error) || ('Invalid username or password (HTTP ' + r.status + ')');
          err.classList.add('show');
          return;
        }
        status.textContent = 'Signed in. Opening the dashboard…';
        status.className = 'form-status show';
        location.href = '/admin/index.html';
      } catch (e) {
        status.className = 'form-status';
        err.textContent = 'Network error. Check your connection and try again.';
        err.classList.add('show');
      } finally {
        btn.disabled = false; btn.classList.remove('is-loading'); btn.textContent = 'Sign in';
      }
    });
  </script>
</body>
</html>
