<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Sign in · VPS Admin</title>
  <link rel="icon" type="image/svg+xml" href="/images/favicon.svg" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Fraunces:opsz,wght@9..144,500;9..144,600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/css/admin.css?v=5" />
  <style>
    body { display: flex; align-items: center; justify-content: center; min-height: 100vh; padding: 24px; }
    .login-card {
      width: 100%; max-width: 400px;
      padding: 32px;
      background: rgba(30, 20, 44, 0.6);
      backdrop-filter: blur(20px) saturate(180%);
      -webkit-backdrop-filter: blur(20px) saturate(180%);
      border: 1px solid var(--glass-border-strong);
      border-radius: var(--r-lg);
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
    }
    .login-card .brand {
      display: flex; align-items: center; gap: 12px;
      margin-bottom: 24px;
      padding-bottom: 20px;
      border-bottom: 1px solid var(--glass-border);
    }
    .login-card .brand .logo {
      width: 40px; height: 40px;
      border-radius: 10px;
      background: linear-gradient(135deg, var(--accent-light), var(--rose));
      color: white;
      display: grid; place-items: center;
      font-family: 'Fraunces', serif; font-weight: 600; font-size: 20px;
      box-shadow: 0 4px 16px var(--accent-glow);
    }
    .login-card .brand .name { font-weight: 600; color: var(--ink-1); font-size: 15px; }
    .login-card .brand .sub { font-size: 12px; color: var(--ink-3); }
    .login-card h1 { margin: 0 0 6px; font-family: 'Fraunces', serif; font-weight: 500; font-size: 22px; color: var(--ink-1); }
    .login-card .hint { color: var(--ink-3); font-size: 13px; margin: 0 0 20px; }
    .login-card .btn-primary { width: 100%; justify-content: center; margin-top: 4px; }
    .login-card .back { text-align: center; margin-top: 16px; font-size: 12px; }
    .login-card .back a { color: var(--ink-3); text-decoration: none; }
    .login-card .back a:hover { color: var(--ink-1); }
  </style>
</head>
<body class="admin-body">
  <div class="bg-mesh" aria-hidden="true"></div>
  <div class="login-card">
    <div class="brand">
      <div class="logo">V</div>
      <div>
        <div class="name">Virat Public School</div>
        <div class="sub">Admin panel</div>
      </div>
    </div>
    <h1>Sign in</h1>
    <p class="hint">Manage school content, parents, exams, and results.</p>
    <form id="login-form" novalidate>
      <div class="form-group">
        <label class="form-label" for="username">Username</label>
        <input type="text" id="username" name="username" required autocomplete="username" autofocus value="Arvindjaat1011" />
      </div>
      <div class="form-group">
        <label class="form-label" for="password">Password</label>
        <input type="password" id="password" name="password" required autocomplete="current-password" />
      </div>
      <div id="login-error" class="form-error-banner"></div>
      <button type="submit" class="btn btn-primary btn-lg" id="login-btn" style="width:100%; justify-content:center;">Sign in</button>
    </form>
    <p class="back"><a href="/">← Back to website</a></p>
  </div>

  <script>
    document.getElementById('login-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const err = document.getElementById('login-error');
      err.classList.remove('show');
      const username = document.getElementById('username').value.trim();
      const password = document.getElementById('password').value;
      const btn = document.getElementById('login-btn');
      btn.disabled = true; btn.textContent = 'Signing in…';
      try {
        const r = await fetch('/api/admin/auth', {
          method: 'POST',
          headers: { 'content-type': 'application/json' },
          credentials: 'include',
          body: JSON.stringify({ username, password })
        });
        const d = await r.json();
        if (!r.ok || !d.user) {
          err.textContent = (d && d.error) || ('Invalid username or password (HTTP ' + r.status + ')');
          err.classList.add('show');
          return;
        }
        location.href = '/admin/index.html';
      } catch (e) {
        err.textContent = 'Network error. Please try again.';
        err.classList.add('show');
      } finally {
        btn.disabled = false; btn.textContent = 'Sign in';
      }
    });
  </script>
</body>
</html>
