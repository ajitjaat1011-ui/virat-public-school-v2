<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Gallery | Virat Public School Admin</title>
  <link rel="icon" type="image/svg+xml" href="/images/favicon.svg" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/css/admin.css?v=2" />
</head>
<body class="admin-body">
  <header class="admin-header">
    <div class="container-wide">
      <div class="admin-header-inner">
        <a href="/admin/" class="admin-brand">
          <span class="logo">V</span>
          <div><div class="name">VPS Admin</div><div class="sub">Virat Public School</div></div>
        </a>
        <nav class="admin-nav" aria-label="Admin">
          <a href="/admin/">Dashboard</a>
          <a href="/admin/notices.html">Notices</a>
          <a href="/admin/gallery.html" class="active">Gallery</a>
          <a href="/admin/results.html">Results</a>
          <a href="/admin/inquiries.html">Inquiries</a>
          <a href="/admin/messages.html">Messages</a>
          <a href="/admin/audit.html">Audit</a>
        </nav>
        <div class="admin-user">
          <span id="admin-name">…</span>
          <button class="logout" id="logout-btn">Sign out</button>
        </div>
      </div>
    </div>
  </header>

  <main class="admin-main">
    <div class="container-wide">
      <h1 class="page-title">Gallery Albums</h1>
      <p class="page-sub">All photo albums shown on the public site.</p>

      <div class="table-wrap">
        <div id="list"><div class="empty-state"><p>Loading…</p></div></div>
      </div>
    </div>
  </main>

  <div id="toast-area"></div>

  <script>
  (async function () {
    const esc = (s) => String(s||'').replace(/[&<>"']/g, (c) => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'})[c]);
    const fmt = (iso) => iso ? new Date(iso).toLocaleDateString('en-IN', { day:'numeric', month:'short', year:'numeric' }) : '';

    const me = await fetch('/api/admin/auth').then(r => r.ok ? r.json() : null);
    if (!me || !me.user) { location.href = '/admin/login.html'; return; }
    document.getElementById('admin-name').textContent = me.user.name;

    async function load() {
      try {
        const r = await fetch('/api/gallery?limit=200');
        const d = await r.json();
        const items = d.albums || d.results || [];
        render(items);
      } catch (e) {
        document.getElementById('list').innerHTML = '<div class="empty-state"><h3>Could not load</h3></div>';
      }
    }

    function render(items) {
      const el = document.getElementById('list');
      if (!items.length) {
        el.innerHTML = '<div class="empty-state"><h3>No albums yet</h3><p>Photo albums will appear here.</p></div>';
        return;
      }
      el.innerHTML = `
        <table class="admin-table">
          <thead><tr><th>Event date</th><th>Title</th><th>Slug</th><th>Photos</th><th>Public</th></tr></thead>
          <tbody>${items.map((a) => `
            <tr>
              <td style="white-space:nowrap;font-size:13px;">${fmt(a.event_date)}</td>
              <td><strong>${esc(a.title)}</strong>${a.description ? '<br><span style="color:var(--ink-500);font-size:12px;">' + esc(a.description) + '</span>' : ''}</td>
              <td><code style="background:var(--plum-50);padding:2px 6px;border-radius:6px;font-size:12px;">${esc(a.slug)}</code></td>
              <td>${a.photo_count || 0}</td>
              <td><a href="/album.html?slug=${encodeURIComponent(a.slug)}" target="_blank" class="btn btn-ghost btn-sm">View →</a></td>
            </tr>`).join('')}</tbody>
        </table>`;
    }

    document.getElementById('logout-btn').addEventListener('click', async () => {
      await fetch('/api/admin/auth', { method: 'DELETE' });
      location.href = '/admin/login.html';
    });

    load();
  })();
  </script>
</body>
</html>
