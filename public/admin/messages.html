<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Messages | Admin | Virat Public School</title>
  <link rel="icon" type="image/svg+xml" href="/images/favicon.svg" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/css/style.css" />
  <link rel="stylesheet" href="/css/admin.css" />
</head>
<body class="admin-body">

  <header class="admin-header">
    <div class="container-wide">
      <a href="/admin/" class="admin-brand">
        <span class="brand-logo">V</span>
        <span style="font-size:14px;">VPS Admin</span>
      </a>
      <nav class="admin-nav" aria-label="Admin">
        <a href="/admin/">Dashboard</a>
        <a href="/admin/notices.html">Notices</a>
        <a href="/admin/gallery.html">Gallery</a>
        <a href="/admin/results.html">Results</a>
        <a href="/admin/inquiries.html">Inquiries</a>
        <a href="/admin/messages.html" class="active">Messages</a>
        <a href="/admin/audit.html">Audit</a>
      </nav>
      <div class="admin-user">
        <button class="btn btn-ghost btn-sm" id="logout-btn" style="color:var(--color-white);">Sign out</button>
      </div>
    </div>
  </header>

  <main class="admin-main">
    <div class="container-wide">
      <h1 class="page-title">Contact Messages</h1>
      <p class="page-subtitle">Messages submitted through the website contact form.</p>

      <div class="form-card">
        <div id="list"><p class="text-meta text-center" style="padding:var(--space-6);">Loading…</p></div>
      </div>
    </div>
  </main>

  <div class="toast-container" id="toasts"></div>

  <script>
    (function () {
      const esc = (s) => String(s||'').replace(/[&<>"']/g, (c) => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'})[c]);
      const fmt = (iso) => iso ? new Date(iso).toLocaleString('en-IN', { day:'numeric', month:'short', year:'numeric', hour:'2-digit', minute:'2-digit' }) : '';
      const toast = (msg, type='success') => {
        const t = document.createElement('div');
        t.className = 'toast ' + type;
        t.textContent = msg;
        document.getElementById('toasts').appendChild(t);
        setTimeout(() => t.remove(), 4000);
      };
      async function load() {
        const res = await fetch('/api/admin/messages');
        const data = await res.json();
        const container = document.getElementById('list');
        if (!data.messages.length) { container.innerHTML = '<p class="text-meta text-center" style="padding:var(--space-6);">No messages yet.</p>'; return; }
        container.innerHTML = `
          <table class="admin-table">
            <thead><tr><th>When</th><th>Name</th><th>Email</th><th>Subject</th><th>Status</th><th>Actions</th></tr></thead>
            <tbody>${data.messages.map((m) => `
              <tr ${!m.is_read ? 'style="background:#fffbeb;"' : ''}>
                <td style="white-space:nowrap;">${fmt(m.created_at)}</td>
                <td><strong>${esc(m.name)}</strong></td>
                <td><a href="mailto:${esc(m.email)}">${esc(m.email)}</a></td>
                <td>${esc(m.subject)}</td>
                <td>${m.is_read ? '<span class="badge-status status-published">Read</span>' : '<span class="badge-status status-draft">Unread</span>'}</td>
                <td>
                  <div class="actions">
                    <button data-action="view" data-id="${m.id}">View</button>
                    ${!m.is_read ? `<button data-action="read" data-id="${m.id}">Mark read</button>` : ''}
                  </div>
                </td>
              </tr>`).join('')}</tbody>
          </table>`;
        container.querySelectorAll('[data-action]').forEach((b) => {
          b.addEventListener('click', async () => {
            if (b.dataset.action === 'view') {
              const m = data.messages.find((x) => x.id === b.dataset.id);
              const w = window.open('', '_blank', 'width=520,height=500');
              w.document.write('<html><head><title>' + esc(m.subject) + '</title><style>body{font-family:Inter,sans-serif;padding:24px;line-height:1.6;}h1{margin-top:0;}</style></head><body><h1>' + esc(m.subject) + '</h1><p><strong>From:</strong> ' + esc(m.name) + ' &lt;' + esc(m.email) + '&gt;</p><p><strong>When:</strong> ' + fmt(m.created_at) + '</p><hr><p>' + esc(m.message).replace(/\n/g, '<br>') + '</p></body></html>');
              if (!m.is_read) { await fetch('/api/admin/messages/' + m.id, { method: 'POST' }); load(); }
            } else if (b.dataset.action === 'read') {
              await fetch('/api/admin/messages/' + b.dataset.id, { method: 'POST' });
              toast('Marked as read');
              load();
            }
          });
        });
      }
      document.getElementById('logout-btn').addEventListener('click', async () => { await fetch('/api/admin/auth', { method: 'DELETE' }); location.href = '/admin/login.html'; });
      load();
    })();
  </script>
</body>
</html>
