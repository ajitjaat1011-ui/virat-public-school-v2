<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Messages · VPS Admin</title>
  <link rel="icon" type="image/svg+xml" href="/images/favicon.svg" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Fraunces:opsz,wght@9..144,500;9..144,600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/css/admin.css?v=5" />
  <style>
    .list-item { display: flex; align-items: center; gap: 14px; padding: 16px 20px; background: var(--glass-bg); border: 1px solid var(--glass-border); border-radius: var(--r-md); margin-bottom: 8px; transition: border-color 0.15s, background 0.15s; }
    .list-item:hover { border-color: var(--glass-border-strong); background: var(--glass-bg-hover); }
    .list-item.unread { border-left: 3px solid var(--rose); }
    .list-item .body { flex: 1; min-width: 0; }
    .list-item .title { font-size: 15px; font-weight: 500; color: var(--ink-1); margin-bottom: 4px; }
    .list-item .meta { font-size: 12px; color: var(--ink-3); display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
    .message-body { background: rgba(0, 0, 0, 0.2); border: 1px solid var(--glass-border); border-radius: var(--r-md); padding: 14px; font-size: 14px; color: var(--ink-2); white-space: pre-wrap; line-height: 1.6; }
  </style>
</head>
<body class="admin-body">
  <div id="app-root"></div>
  <div id="page-content" style="display:none;">
    <div class="page-head">
      <div>
        <h1>Contact messages</h1>
        <p>Submissions from the public contact form.</p>
      </div>
    </div>
    <div id="list"><p style="color:var(--ink-3);">Loading…</p></div>
  </div>

  <div class="modal-backdrop" id="view-modal">
    <div class="modal" id="view-content"></div>
  </div>

  <script>
    window.ADMIN_PAGE = { title: 'Messages', crumb: 'Manage' };
  </script>
  <script src="/js/admin.js?v=1"></script>
  <script>
    const esc = s => String(s==null?'':s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'})[c]);
    const fmt = iso => iso ? new Date(iso).toLocaleString('en-IN', { day:'numeric', month:'short', year:'numeric', hour:'2-digit', minute:'2-digit' }) : '';

    let messages = [];

    async function load() {
      try {
        const r = await fetch('/api/admin/messages', { credentials: 'include' });
        if (r.status === 401) { location.href = '/admin/login.html'; return; }
        const d = await r.json();
        messages = d.messages || [];
        render();
      } catch (e) {
        document.getElementById('list').innerHTML = '<div class="empty-state"><h3>Could not load</h3></div>';
      }
    }

    function render() {
      const el = document.getElementById('list');
      if (!messages.length) {
        el.innerHTML = '<div class="empty-state"><h3>No messages</h3><p>Submissions from the contact form will appear here.</p></div>';
        return;
      }
      el.innerHTML = messages.map(m => `
        <div class="list-item ${!m.is_read ? 'unread' : ''}" data-id="${esc(m.id)}">
          <div class="body">
            <div class="title">${esc(m.name)} <span style="font-weight:400; color:var(--ink-3);">· ${esc(m.email)}</span></div>
            <div class="meta">
              <strong style="color:var(--ink-1); font-weight: 500;">${esc(m.subject)}</strong>
              ${!m.is_read ? '<span class="pill pill-new">New</span>' : '<span class="pill pill-draft">Read</span>'}
              <span>${fmt(m.created_at)}</span>
            </div>
          </div>
          <button class="btn btn-ghost btn-sm" data-action="view">Open</button>
        </div>
      `).join('');
      el.querySelectorAll('[data-action="view"]').forEach(b => {
        b.addEventListener('click', () => {
          const m = messages.find(x => x.id === b.closest('.list-item').dataset.id);
          openMessage(m);
        });
      });
    }

    function openMessage(m) {
      if (!m) return;
      document.getElementById('view-content').innerHTML = `
        <h2>${esc(m.subject)}</h2>
        <p class="modal-sub">Received ${fmt(m.created_at)}</p>
        <div style="display:grid;grid-template-columns:1fr;gap:16px;">
          <div>
            <div class="form-label" style="margin-bottom:4px;">From</div>
            <div style="font-size:15px;font-weight:500;color:var(--ink-1);">${esc(m.name)}</div>
            <div style="margin-top:4px;"><a href="mailto:${esc(m.email)}">${esc(m.email)}</a>${m.phone ? ' · <a href="tel:' + esc(m.phone) + '">' + esc(m.phone) + '</a>' : ''}</div>
          </div>
          <div>
            <div class="form-label" style="margin-bottom:4px;">Message</div>
            <div class="message-body">${esc(m.message)}</div>
          </div>
        </div>
        <div class="modal-actions">
          <button class="btn btn-ghost" id="close-btn">Close</button>
        </div>`;
      document.getElementById('view-modal').classList.add('open');
      document.getElementById('close-btn').addEventListener('click', () => document.getElementById('view-modal').classList.remove('open'));
      if (!m.is_read) markRead(m.id);
    }

    async function markRead(id) {
      try { await fetch('/api/admin/messages/' + id, { method: 'POST', credentials: 'include' }); load(); } catch (e) {}
    }

    window.onShellReady = function () {
      document.getElementById('view-modal').addEventListener('click', e => {
        if (e.target.id === 'view-modal') e.target.classList.remove('open');
      });
      load();
    };
  </script>
</body>
</html>
