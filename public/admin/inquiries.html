<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Inquiries | Virat Public School Admin</title>
  <link rel="icon" type="image/svg+xml" href="/images/favicon.svg" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/css/admin.css?v=2" />
</head>
<body class="admin-body">
  <header class="admin-header">
    <div class="container-wide">
      <div class="admin-header-inner">
        <a href="/admin/" class="admin-brand">
          <span class="logo">V</span>
          <div><div class="name">VPS Admin</div><div class="sub">Virat Public School</div></div>
        </a>
        <nav class="admin-nav" aria-label="Admin">
          <a href="/admin/">Dashboard</a>
          <a href="/admin/notices.html">Notices</a>
          <a href="/admin/gallery.html">Gallery</a>
          <a href="/admin/results.html">Results</a>
          <a href="/admin/inquiries.html" class="active">Inquiries</a>
          <a href="/admin/messages.html">Messages</a>
          <a href="/admin/audit.html">Audit</a>
        </nav>
        <div class="admin-user">
          <span id="admin-name">…</span>
          <button class="logout" id="logout-btn">Sign out</button>
        </div>
      </div>
    </div>
  </header>

  <main class="admin-main">
    <div class="container-wide">
      <h1 class="page-title">Admission Inquiries</h1>
      <p class="page-sub">All submitted admission inquiries. Mark as contacted or admitted as you follow up.</p>

      <div class="filter-bar">
        <input type="text" id="search" placeholder="Search by name or phone…" style="max-width:280px;" />
        <select id="filter-status" style="max-width:200px;">
          <option value="">All statuses</option>
          <option value="NEW">New</option>
          <option value="CONTACTED">Contacted</option>
          <option value="ADMITTED">Admitted</option>
          <option value="REJECTED">Rejected</option>
        </select>
      </div>

      <div class="table-wrap">
        <div id="list"><div class="empty-state"><p>Loading…</p></div></div>
      </div>
    </div>
  </main>

  <div class="modal-backdrop" id="view-modal">
    <div class="modal" id="view-content"></div>
  </div>
  <div id="toast-area"></div>

  <script>
  (async function () {
    const esc = (s) => String(s||'').replace(/[&<>"']/g, (c) => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'})[c]);
    const fmt = (iso) => iso ? new Date(iso).toLocaleString('en-IN', { day:'numeric', month:'short', year:'numeric', hour:'2-digit', minute:'2-digit' }) : '';
    const toast = (msg, type='success') => {
      const t = document.createElement('div');
      t.className = 'toast ' + type;
      t.textContent = msg;
      document.getElementById('toast-area').appendChild(t);
      setTimeout(() => t.remove(), 4000);
    };

    // Auth check
    const me = await fetch('/api/admin/auth').then(r => r.ok ? r.json() : null);
    if (!me || !me.user) { location.href = '/admin/login.html'; return; }
    document.getElementById('admin-name').textContent = me.user.name;

    let inquiries = [];
    async function load() {
      try {
        const res = await fetch('/api/admin/inquiries');
        if (res.status === 401) { location.href = '/admin/login.html'; return; }
        const data = await res.json();
        inquiries = data.inquiries || [];
        render();
      } catch (e) {
        document.getElementById('list').innerHTML = '<div class="empty-state"><h3>Could not load</h3><p>Please refresh and try again.</p></div>';
      }
    }

    function render() {
      const q = document.getElementById('search').value.toLowerCase();
      const st = document.getElementById('filter-status').value;
      const filtered = inquiries.filter((i) => {
        if (q && !((i.parent_name||'').toLowerCase().includes(q) || (i.student_name||'').toLowerCase().includes(q) || (i.parent_phone||'').includes(q))) return false;
        if (st && i.status !== st) return false;
        return true;
      });
      const el = document.getElementById('list');
      if (!filtered.length) {
        el.innerHTML = '<div class="empty-state"><h3>No inquiries</h3><p>New submissions will appear here.</p></div>';
        return;
      }
      el.innerHTML = `
        <table class="admin-table">
          <thead><tr><th>Received</th><th>Parent</th><th>Student</th><th>Class</th><th>Phone</th><th>Status</th><th>Actions</th></tr></thead>
          <tbody>${filtered.map((i) => `
            <tr ${i.status === 'NEW' ? 'style="background:#fffbeb;"' : ''}>
              <td style="white-space:nowrap;font-size:13px;">${fmt(i.created_at)}</td>
              <td><strong>${esc(i.parent_name)}</strong>${i.parent_email ? '<br><span style="color:var(--ink-500);font-size:12px;">' + esc(i.parent_email) + '</span>' : ''}</td>
              <td>${esc(i.student_name)}</td>
              <td>${esc(i.class_seeking)}</td>
              <td><a href="tel:${esc(i.parent_phone)}">${esc(i.parent_phone)}</a><br><a href="https://wa.me/91${esc(i.parent_phone)}" target="_blank" rel="noopener" style="color:#2f9e6b;font-size:12px;">WhatsApp</a></td>
              <td><span class="badge ${esc(i.status)}">${esc(i.status)}</span></td>
              <td>
                <div class="actions">
                  <button data-action="view" data-id="${i.id}">View</button>
                  ${i.status !== 'CONTACTED' ? `<button data-action="contacted" data-id="${i.id}">Contacted</button>` : ''}
                  ${i.status !== 'ADMITTED' ? `<button data-action="admitted" data-id="${i.id}" class="ok">Admit</button>` : ''}
                  <button data-action="delete" data-id="${i.id}" class="danger">Delete</button>
                </div>
              </td>
            </tr>`).join('')}</tbody>
        </table>`;
      el.querySelectorAll('[data-action]').forEach((b) => {
        b.addEventListener('click', async () => {
          const id = b.dataset.id;
          if (b.dataset.action === 'view') viewInquiry(inquiries.find((i) => i.id === id));
          else if (b.dataset.action === 'contacted') updateStatus(id, 'CONTACTED');
          else if (b.dataset.action === 'admitted') updateStatus(id, 'ADMITTED');
          else if (b.dataset.action === 'delete') deleteInquiry(id);
        });
      });
    }

    function viewInquiry(i) {
      if (!i) return;
      document.getElementById('view-content').innerHTML = `
        <h2>Inquiry details</h2>
        <p class="text-mute" style="font-size:13px;">Received ${fmt(i.created_at)}</p>
        <div style="margin-top:20px;">
          <p><strong>Parent:</strong> ${esc(i.parent_name)}</p>
          <p><strong>Phone:</strong> <a href="tel:${esc(i.parent_phone)}">${esc(i.parent_phone)}</a> · <a href="https://wa.me/91${esc(i.parent_phone)}" target="_blank" rel="noopener" style="color:#2f9e6b;">WhatsApp</a></p>
          <p><strong>Email:</strong> ${esc(i.parent_email || '—')}</p>
          <hr style="border:none;border-top:1px solid #ebe6ef;margin:16px 0;">
          <p><strong>Student:</strong> ${esc(i.student_name)}</p>
          <p><strong>Class sought:</strong> ${esc(i.class_seeking)}</p>
          <p><strong>Date of birth:</strong> ${esc(i.dob || '—')}</p>
          <p><strong>Address:</strong> ${esc(i.address || '—')}</p>
          <p><strong>Message:</strong><br>${esc(i.message || '—')}</p>
          <hr style="border:none;border-top:1px solid #ebe6ef;margin:16px 0;">
          <p><strong>Status:</strong> <span class="badge ${esc(i.status)}">${esc(i.status)}</span></p>
        </div>
        <div class="modal-actions">
          <button class="btn btn-ghost" onclick="document.getElementById('view-modal').classList.remove('open')">Close</button>
        </div>`;
      document.getElementById('view-modal').classList.add('open');
    }

    async function updateStatus(id, status) {
      try {
        const r = await fetch('/api/admin/inquiries/' + id, {
          method: 'POST', headers: { 'content-type': 'application/json' },
          body: JSON.stringify({ status })
        });
        if (!r.ok) throw new Error('Failed');
        toast('Status updated to ' + status);
        load();
      } catch (e) { toast(e.message, 'error'); }
    }

    async function deleteInquiry(id) {
      if (!confirm('Delete this inquiry?')) return;
      try {
        const r = await fetch('/api/admin/inquiries/' + id, { method: 'DELETE' });
        if (!r.ok) throw new Error('Failed');
        toast('Inquiry deleted');
        load();
      } catch (e) { toast(e.message, 'error'); }
    }

    ['search', 'filter-status'].forEach((id) => document.getElementById(id).addEventListener('input', render));
    document.getElementById('view-modal').addEventListener('click', (e) => {
      if (e.target.id === 'view-modal') e.target.classList.remove('open');
    });
    document.getElementById('logout-btn').addEventListener('click', async () => {
      await fetch('/api/admin/auth', { method: 'DELETE' });
      location.href = '/admin/login.html';
    });

    load();
  })();
  </script>
</body>
</html>
