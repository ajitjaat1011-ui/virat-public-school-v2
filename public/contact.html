<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Contact | Virat Public School, Kotputli</title>
  <meta name="description" content="Get in touch with Virat Public School, Virat Nagar, Kotputli, Rajasthan." />
  <meta name="theme-color" content="#6d3877" />
  <link rel="icon" type="image/svg+xml" href="images/favicon.svg" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <a href="#main" class="skip-link">Skip to main content</a>
  <div id="vps-topbar"></div>
  <div id="vps-header"></div>

  <main id="main">

    <section class="page-header">
      <div class="container-wide">
        <span class="section-eyebrow">Contact</span>
        <h1>Come and say hello.</h1>
        <p>Office hours are 8 AM to 4 PM, Monday to Saturday.</p>
      </div>
    </section>

    <section class="section">
      <div class="container-wide">
        <div style="display:grid;grid-template-columns:1fr;gap:32px;" class="contact-grid">
          <div class="card" style="text-align:center;">
            <h3 style="color:var(--plum-700);margin-bottom:8px;">Visit</h3>
            <p style="margin:0;">Virat Nagar, Kotputli<br>Behror, Rajasthan — 303102</p>
          </div>
          <div class="card" style="text-align:center;">
            <h3 style="color:var(--plum-700);margin-bottom:8px;">Call</h3>
            <p style="margin:0;"><a href="tel:+919000000000">+91 90000 00000</a></p>
          </div>
          <div class="card" style="text-align:center;">
            <h3 style="color:var(--plum-700);margin-bottom:8px;">Email</h3>
            <p style="margin:0;"><a href="mailto:office@viratpublicschool.in">office@viratpublicschool.in</a></p>
          </div>
        </div>
        <style>
          @media (min-width: 720px) {
            .contact-grid { grid-template-columns: repeat(3, 1fr) !important; }
          }
        </style>
      </div>
    </section>

    <section class="section section-soft">
      <div class="container-narrow">
        <div class="text-center mb-6">
          <span class="section-eyebrow">Write to us</span>
          <h2 class="section-title">Send us a message.</h2>
        </div>
        <form id="contact-form" class="form" style="background:white;padding:32px;border-radius:28px;box-shadow:0 8px 30px rgba(106,56,119,0.07);">
          <div class="form-row">
            <div class="form-group">
              <label class="form-label" for="name">Your name</label>
              <input class="form-input" type="text" id="name" name="name" required />
            </div>
            <div class="form-group">
              <label class="form-label" for="email">Email</label>
              <input class="form-input" type="email" id="email" name="email" required />
            </div>
          </div>
          <div class="form-group">
            <label class="form-label" for="phone">Phone (optional)</label>
            <input class="form-input" type="tel" id="phone" name="phone" />
          </div>
          <div class="form-group">
            <label class="form-label" for="subject">Subject</label>
            <input class="form-input" type="text" id="subject" name="subject" required />
          </div>
          <div class="form-group">
            <label class="form-label" for="message">Message</label>
            <textarea class="form-textarea" id="message" name="message" rows="5" required></textarea>
          </div>
          <button type="submit" class="btn btn-accent btn-lg" style="justify-content:center;">Send message</button>
          <div id="form-status"></div>
        </form>
      </div>
    </section>

  </main>

  <div id="vps-footer"></div>

  <script src="js/partials.js?v=2"></script>
  <script src="js/main.js?v=2"></script>
  <script>
    document.getElementById('contact-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const status = document.getElementById('form-status');
      const data = Object.fromEntries(new FormData(e.target));
      try {
        const r = await fetch('/api/contact', {
          method: 'POST',
          headers: { 'content-type': 'application/json' },
          body: JSON.stringify(data)
        });
        if (r.ok) {
          status.innerHTML = '<div class="form-success">Thank you. We\'ll get back to you soon.</div>';
          e.target.reset();
        } else {
          status.innerHTML = '<p class="form-error">Something went wrong. Please try again.</p>';
        }
      } catch (err) {
        status.innerHTML = '<p class="form-error">Network error. Please try again.</p>';
      }
    });
  </script>
</body>
</html>
