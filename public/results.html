<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Results | Virat Public School</title>
  
  <meta name="theme-color" content="#ff3d80" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <link rel="manifest" href="/manifest.json" />
  <link rel="apple-touch-icon" href="/images/icon-192.png" />
  <link rel="icon" type="image/svg+xml" href="images/favicon.svg" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="preload" as="style" onload="this.onload=null;this.rel='stylesheet'" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600;9..144,700&display=swap" />
  <link rel="stylesheet" href="css/style.css?v=14" />
  <link rel="stylesheet" href="/css/components.css?v=2" />
</head>
<body>
  <a href="#main" class="skip-link">Skip to main content</a>
  <div id="vps-topbar"></div>
  <div id="vps-header"></div>

  <main id="main">
    
  <section class="page-header">
    <div class="container-wide">
      <span class="section-eyebrow">Results</span>
      <h1>Check your result.</h1>
      <p>Enter your roll number and date of birth to see your marks.</p>
    </div>
  </section>

    <section class="section">
      <div class="container-narrow">
        <form id="result-form" class="form form-surface reveal">
          <div class="form-row">
            <div class="form-group">
              <label class="form-label" for="roll">Roll number</label>
              <input class="form-input" type="text" id="roll" name="roll" placeholder="e.g. 10-001" required />
            </div>
            <div class="form-group">
              <label class="form-label" for="dob">Date of birth</label>
              <input class="form-input" type="date" id="dob" name="dob" required />
            </div>
          </div>
          <div id="lookup-status" class="form-status" role="status" aria-live="polite"></div>
          <button type="submit" class="btn btn-accent btn-lg" id="lookup-btn">View result <span class="arrow">→</span></button>
          <p class="form-help text-center">Your roll number and date of birth must match the school record.</p>
        </form>
        <div id="result-out" class="mt-7" aria-live="polite"></div>
      </div>
    </section>
    
  </main>

  <div id="vps-footer"></div>

  <script src="js/partials.js?v=12"></script>
  <script src="js/main.js?v=9"></script>
  <script>
    document.getElementById('result-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const out = document.getElementById('result-out');
      const status = document.getElementById('lookup-status');
      const button = document.getElementById('lookup-btn');
      const roll = document.getElementById('roll').value.trim();
      const dob = document.getElementById('dob').value;
      status.className = 'form-status';
      if (!roll || !dob) { status.textContent = 'Enter both roll number and date of birth.'; status.className = 'form-status show error'; return; }
      button.disabled = true; button.classList.add('is-loading'); button.textContent = 'Looking up…';
      status.textContent = 'Searching published results…'; status.className = 'form-status show warning';
      out.innerHTML = '<div class="empty">Looking up the result…</div>';
      try {
        const r = await fetch('/api/results/lookup?roll=' + encodeURIComponent(roll) + '&dob=' + encodeURIComponent(dob));
        const d = await r.json();
        if (!r.ok || d.error) { status.textContent = 'No published result matched those details.'; status.className = 'form-status show error'; out.innerHTML = '<div class="form-error-banner show">Check the roll number and date of birth, then try again.</div>'; return; }
        const s = d.student || {};
        const marks = d.marks || [];
        status.textContent = 'Published result found.'; status.className = 'form-status show';
        out.innerHTML = `<div class="table-wrap">
          <h3 style="margin-bottom:8px;">${esc(s.name || '')}</h3>
          <p style="color:var(--ink-500);font-size:13px;margin-bottom:16px;">Class ${esc(s.class || '')} · Roll ${esc(s.roll || roll)}</p>
          <table class="table">
            <thead><tr><th>Subject</th><th>Marks</th><th>Grade</th></tr></thead>
            <tbody>${marks.map(m => `<tr><td>${esc(m.subject)}</td><td>${esc(String(m.marks))}</td><td>${esc(m.grade || '')}</td></tr>`).join('')}</tbody>
          </table>
          <p style="margin-top:16px;color:var(--plum-700);font-weight:600;">Total: ${esc(String(d.total || marks.reduce((a,b) => a + Number(b.marks||0), 0)))}</p>
        </div>`;
      } catch (err) { status.textContent = 'Could not reach the server. Please try again.'; status.className = 'form-status show error'; out.innerHTML = '<div class="form-error-banner show">Check your connection and try again.</div>'; }
      finally { button.disabled = false; button.classList.remove('is-loading'); button.innerHTML = 'View result <span class="arrow">→</span>'; }
    });
    function esc(s) { return String(s || '').replace(/[&<>"']/g, c => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' })[c]); }
    </script>
  <script src="/js/i18n.js?v=2"></script>
</body>
</html>
